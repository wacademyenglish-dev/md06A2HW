<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HW | The Skills Pitch (A2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #0A0A0A;
            --bg-panel: #171717;
            --accent-brand: #10B981;
            --accent-success: #34D399;
            --accent-alert: #EF4444;
            --text-main: #F9FAFB;
        }
        body {
            background-color: var(--bg-void);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            background-color: var(--bg-panel);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.05);
        }
        h1, h2 { font-family: 'Playfair Display', serif; }
        
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
        }
        .screen.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .screen.hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .screen.active { transform: translateX(0); opacity: 1; pointer-events: auto; }

        .btn-brand {
            background: var(--accent-brand);
            color: #0A0A0A; font-family: 'Inter', sans-serif; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; border-radius: 6px;
            transition: transform 0.1s; border: none;
        }
        .btn-brand:active { transform: scale(0.95); }

        .option-btn {
            background-color: var(--bg-void); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px; padding: 20px; text-align: left; font-weight: 600;
            transition: all 0.2s; position: relative; overflow: hidden; color: white;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background-color: rgba(16, 185, 129, 0.1); border-left: 4px solid var(--accent-brand); color: var(--accent-brand); }
        .option-btn.wrong { background-color: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--accent-alert); color: #FCA5A5; }
        
        .progress-bar-bg { background: rgba(255,255,255,0.05); height: 4px; border-radius: 2px; overflow: hidden; width: 100%; }
        .progress-bar-fill { background: var(--accent-brand); height: 100%; width: 0%; transition: width 0.3s ease; }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="screen-start" class="screen active p-8 items-center justify-center text-center">
        <div class="w-24 h-24 rounded-full bg-[var(--bg-void)] border border-[var(--accent-brand)] flex items-center justify-center mb-8 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
            <i class="fas fa-id-badge text-4xl text-[var(--accent-brand)]"></i>
        </div>
        <p class="text-[var(--accent-brand)] font-bold text-xs tracking-widest uppercase mb-4">Level A2 Corporate</p>
        <h1 class="text-4xl font-black text-white leading-tight mb-4">The Skills Pitch</h1>
        <p class="text-gray-400 font-medium mb-12">15 rapid-fire questions testing Past Simple, Action Verbs, and "Good at + ING".</p>
        <button onclick="startQuiz()" class="btn-brand w-full py-4 text-lg shadow-lg">Start Session</button>
    </div>

    <div id="screen-quiz" class="screen hidden-right flex flex-col pt-8 pb-6 px-6">
        <div class="flex items-center justify-between mb-4">
            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest" id="q-counter">Q 1/15</span>
            <div class="flex gap-2 text-sm font-bold">
                <span class="text-[var(--accent-brand)]"><i class="fas fa-check mr-1"></i><span id="score-val">0</span></span>
            </div>
        </div>
        <div class="progress-bar-bg mb-8"><div class="progress-bar-fill" id="progress"></div></div>
        
        <div class="flex-grow flex flex-col">
            <span class="text-[9px] font-bold text-[var(--accent-brand)] uppercase tracking-widest mb-3" id="q-category">Grammar Check</span>
            <h2 class="text-2xl font-bold text-white leading-snug mb-8 font-inter" id="q-text">Loading question...</h2>
            
            <div class="flex flex-col gap-4 mt-auto mb-8" id="options-container">
            </div>
        </div>
    </div>

    <div id="screen-wrap" class="screen hidden-right p-8 items-center justify-center text-center">
        <div class="w-32 h-32 rounded-full border-2 border-[var(--accent-brand)] flex items-center justify-center mb-8 shadow-[0_0_40px_rgba(16,185,129,0.2)] bg-[var(--bg-void)]">
            <h1 class="text-5xl font-black text-[var(--accent-brand)]" id="final-score">15/15</h1>
        </div>
        <h2 class="text-3xl font-black text-white mb-4">Hired!</h2>
        <p class="text-gray-400 font-medium mb-12" id="final-message">You have successfully mastered how to pitch your skills and past experience.</p>
        <button onclick="location.reload()" class="btn-brand w-full py-4 text-lg shadow-lg mb-4">Return Home</button>
    </div>

</div>

<script>
    const questions = [
        { category: "Past Simple", q: "I _____ in the marketing department last year.", opts: ["work", "worked", "working"], ans: 1 },
        { category: "Vocabulary", q: "What does 'manage' mean in business?", opts: ["To be in charge of a team.", "To buy a new product.", "To write an email."], ans: 0 },
        { category: "Past Simple", q: "I _____ to college in 2019.", opts: ["goed", "went", "go"], ans: 1 },
        { category: "Skill Expression", q: "I am good at _____ problems.", opts: ["solve", "solved", "solving"], ans: 2 },
        { category: "Red Flag", q: "Which sentence is CORRECT?", opts: ["I am good at organize.", "I am good in organizing.", "I am good at organizing."], ans: 2 },
        { category: "Did Questions", q: "Did you use Excel in your last job?", opts: ["Yes, I use.", "Yes, I did.", "Yes, I used."], ans: 1 },
        { category: "Interview Strategy", q: "If you don't have experience with a software, what do you say?", opts: ["I don't know it.", "I can learn it, I am a fast learner.", "I am an expert."], ans: 1 },
        { category: "Skill Expression", q: "She is very good at _____ with difficult clients.", opts: ["dealing", "deal", "deals"], ans: 0 },
        { category: "Vocabulary", q: "To make something new is to...", opts: ["Develop", "Manage", "Create"], ans: 2 },
        { category: "Past Simple", q: "Last month, we _____ a new project.", opts: ["start", "started", "starting"], ans: 1 },
        { category: "Did Questions", q: "Did she manage the sales team?", opts: ["No, she didn't.", "No, she not managed.", "No, she manage not."], ans: 0 },
        { category: "Red Flag", q: "Find the ERROR:", opts: ["I worked there for two years.", "I am good at typing fast.", "I am good at work under pressure."], ans: 2 },
        { category: "Past Simple", q: "In 2020, I _____ an assistant.", opts: ["was", "am", "were"], ans: 0 },
        { category: "Skill Expression", q: "He doesn't have experience, but he is good at _____.", opts: ["sell", "selling", "selled"], ans: 1 },
        { category: "Final Check", q: "Complete: 'I _____ in sales, and I am good at _____.'", opts: ["worked / negotiating", "work / negotiate", "worked / negotiate"], ans: 0 }
    ];

    let currentQ = 0; let score = 0; let isAnimating = false;

    function startQuiz() {
        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('screen-start').classList.add('hidden-left');
        document.getElementById('screen-quiz').classList.remove('hidden-right');
        document.getElementById('screen-quiz').classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= questions.length) { showWrap(); return; }
        isAnimating = false;
        const q = questions[currentQ];
        document.getElementById('q-counter').innerText = `Q ${currentQ + 1}/${questions.length}`;
        document.getElementById('progress').style.width = `${((currentQ) / questions.length) * 100}%`;
        document.getElementById('q-category').innerText = q.category;
        document.getElementById('q-text').innerText = q.q;
        
        const container = document.getElementById('options-container'); container.innerHTML = '';
        q.opts.forEach((opt, index) => {
            const btn = document.createElement('button'); btn.className = 'option-btn font-inter';
            btn.innerHTML = `<span class="opacity-50 mr-3 text-xs font-bold">${String.fromCharCode(65+index)}</span> ${opt}`;
            btn.onclick = () => checkAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btn) {
        if (isAnimating) return; isAnimating = true;
        const q = questions[currentQ]; const allBtns = document.getElementById('options-container').children;
        if (selectedIndex === q.ans) { btn.classList.add('correct'); score++; document.getElementById('score-val').innerText = score; } 
        else {
            btn.classList.add('wrong', 'shake'); if (navigator.vibrate) navigator.vibrate(200);
            allBtns[q.ans].classList.add('correct');
        }
        setTimeout(() => {
            currentQ++; document.getElementById('progress').style.width = `${((currentQ) / questions.length) * 100}%`;
            setTimeout(loadQuestion, 200);
        }, 1200);
    }

    function showWrap() {
        document.getElementById('screen-quiz').classList.remove('active'); document.getElementById('screen-quiz').classList.add('hidden-left');
        document.getElementById('screen-wrap').classList.remove('hidden-right'); document.getElementById('screen-wrap').classList.add('active');
        document.getElementById('final-score').innerText = `${score}/${questions.length}`;
        const msg = document.getElementById('final-message');
        if (score === 15) msg.innerText = "Flawless performance. You are ready for the interview.";
        else if (score >= 10) msg.innerText = "Strong skills. A quick review and you'll be unstoppable.";
        else msg.innerText = "Review the Past Simple and the 'Good at + ING' rules to improve.";
    }
</script>
</body>
</html>
